# Site settings
title: Shiven Kashyap # site title
description: >- # site description
  i talk about tech here
lang: en-US
timezone: Asia/Calcutta
image: assets/img/me.png
repo: 
mode: dark

# Profile settings
author:
  name: Shiven Kashyap
  bio: >-
    im an engineering sophomore - an ml/dl student, researcher, freeware author.
  username: shivenkashyapp
  github: shivenkashyapp 
  twitter: 
  facebook: 
  email: shivenkashyap24@gmail.com
  avatar: /assets/img/me.png

url:
baseurl:
permalink: /:title/
google_analytics:
fb_appid:

# Collection setting
collections:
  posts:
    output: true

# Markdown settings
markdown: kramdown
highlighter: rouge
kramdown:
  syntax_highlighter: rouge

# Default front matter
defaults:
  - scope:
      path: ""
    values:
      layout: post
      comments: false

# Jekyll Compose default front matter
jekyll_compose:
  post_default_front_matter:
    modified:
    tags: []
    description:
  draft_default_front_matter:
    modified:
    tags: []
    description:

# Homepage limit posts
number_of_posts: 5

# Build settings
# theme: klise
sass:
  style: compressed

include:
  - _redirects
  - .htaccess

exclude:
  - CNAME
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - CHANGELOG.md
  - README.md
  - node_modules
  - CODE_OF_CONDUCT.md
  - CONTRIBUTING.md
  - lighthouse.png
  - klise-*.gem
  - klise.gemspec

# Plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-postfiles
